<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Catálogo de Alunos</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  margin: 0;
  color: #333;
}

h1 {
  text-align: center;
  color: white;
  margin-top: 20px;
}

.busca-box {
  display: flex;
  justify-content: center;
  margin: 20px;
}

#busca {
  width: 300px;
  padding: 12px 20px;
  border-radius: 30px;
  border: none;
  outline: none;
  font-size: 16px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.add-box {
  text-align: center;
}

#novoNome {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 200px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #00c9a7;
  color: white;
  cursor: pointer;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;

  /* 🔥 BARRA DE ROLAGEM */
  max-height: 400px;
  overflow-y: auto;
}

/* Scroll bonito */
.container::-webkit-scrollbar {
  width: 10px;
}

.container::-webkit-scrollbar-thumb {
  background: #00c9a7;
  border-radius: 10px;
}

.card {
  background: white;
  margin: 10px;
  padding: 20px;
  width: 160px;
  border-radius: 15px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
  text-align: center;
  font-weight: bold;
}

.card:hover {
  transform: translateY(-5px) scale(1.05);
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  top: 0;
  left: 0;
}

.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  width: 320px;
  border-radius: 12px;
}

#fechar {
  float: right;
  cursor: pointer;
}

</style>
</head>

<body>

<h1>📚 Catálogo de Alunos</h1>

<div class="busca-box">
  <input type="text" id="busca" placeholder="🔍 Buscar aluno...">
</div>

<div class="add-box">
  <input type="text" id="novoNome" placeholder="Nome do aluno">
  <button onclick="adicionarAluno()">Adicionar</button>
</div>

<div class="container" id="catalogo"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span id="fechar">X</span>
    <h2 id="nomeAluno"></h2>
    <ul id="notas"></ul>
    <p id="media"></p>
  </div>
</div>

<script>
let alunos = [
  {nome:"Aluno 1", notas:[7,8,6,9,7]},
  {nome:"Aluno 2", notas:[5,6,7,8,6]},
  {nome:"Aluno 3", notas:[9,9,8,10,9]},
  {nome:"Aluno 4", notas:[6,7,5,8,6]},
  {nome:"Aluno 5", notas:[8,7,9,9,8]},
  {nome:"Aluno 6", notas:[4,5,6,5,4]},
  {nome:"Aluno 7", notas:[7,8,7,6,7]},
  {nome:"Aluno 8", notas:[9,10,9,8,9]},
  {nome:"Aluno 9", notas:[6,6,7,7,6]},
  {nome:"Aluno 10", notas:[8,9,8,9,8]},
  {nome:"Aluno 11", notas:[5,6,5,6,5]},
  {nome:"Aluno 12", notas:[7,7,8,7,7]},
  {nome:"Aluno 13", notas:[9,8,9,10,9]},
  {nome:"Aluno 14", notas:[6,5,6,7,6]},
  {nome:"Aluno 15", notas:[8,8,7,8,8]},
  {nome:"Aluno 16", notas:[4,5,4,5,4]},
  {nome:"Aluno 17", notas:[7,6,7,6,7]},
  {nome:"Aluno 18", notas:[9,9,10,9,9]},
  {nome:"Aluno 19", notas:[6,7,6,7,6]},
  {nome:"Aluno 20", notas:[8,9,8,9,8]},
  {nome:"Aluno 21", notas:[5,5,6,5,5]},
  {nome:"Aluno 22", notas:[7,8,7,8,7]},
  {nome:"Aluno 23", notas:[9,8,9,9,9]},
  {nome:"Aluno 24", notas:[6,6,5,6,6]},
  {nome:"Aluno 25", notas:[8,7,8,7,8]},
  {nome:"Aluno 26", notas:[4,4,5,4,4]},
  {nome:"Aluno 27", notas:[7,7,6,7,7]},
  {nome:"Aluno 28", notas:[9,10,9,10,9]},
  {nome:"Aluno 29", notas:[6,7,6,7,6]},
  {nome:"Aluno 30", notas:[8,8,9,8,8]}
];

const catalogo = document.getElementById("catalogo");

function normalizar(texto) {
  return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

function render() {
  catalogo.innerHTML = "";
  const filtro = normalizar(document.getElementById("busca").value);

  alunos
    .filter(a => normalizar(a.nome).includes(filtro))
    .forEach(aluno => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerText = aluno.nome;

      card.onclick = () => abrirModal(aluno);

      catalogo.appendChild(card);
    });
}

function abrirModal(aluno) {
  document.getElementById("nomeAluno").innerText = aluno.nome;
  const lista = document.getElementById("notas");
  lista.innerHTML = "";

  let soma = 0;

  aluno.notas.forEach((n,i) => {
    soma += n;
    const li = document.createElement("li");
    li.innerText = "Nota " + (i+1) + ": " + n;
    lista.appendChild(li);
  });

  document.getElementById("media").innerText =
    "Média: " + (soma / aluno.notas.length).toFixed(1);

  document.getElementById("modal").style.display = "block";
}

function adicionarAluno() {
  const nome = document.getElementById("novoNome").value;
  if(nome.trim() === "") return;

  alunos.push({ nome: nome, notas: [0,0,0,0,0] });
  document.getElementById("novoNome").value = "";
  render();
}

document.getElementById("busca").oninput = render;
document.getElementById("fechar").onclick = () =>
  document.getElementById("modal").style.display = "none";

window.onclick = (e) => {
  if(e.target.id === "modal")
    document.getElementById("modal").style.display = "none";
};

render();
</script>

</body>
</html>
