<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Catálogo de Alunos</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  text-align: center;
}

h1 {
  margin: 20px;
}

input, button {
  padding: 8px;
  margin: 5px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: white;
  margin: 10px;
  padding: 15px;
  width: 160px;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  top: 0;
  left: 0;
}

.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  width: 300px;
  border-radius: 10px;
}

#fechar {
  float: right;
  cursor: pointer;
}

</style>
</head>

<body>

<h1>📚 Catálogo de Alunos</h1>

<input type="text" id="busca" placeholder="Buscar aluno...">
<br>

<input type="text" id="novoNome" placeholder="Nome do aluno">
<button onclick="adicionarAluno()">Adicionar</button>

<div class="container" id="catalogo"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span id="fechar">X</span>
    <h2 id="nomeAluno"></h2>
    <ul id="notas"></ul>
    <p id="media"></p>
  </div>
</div>

<script>
let alunos = [
  { nome: "Ana", notas: [8,7,9,10,6] },
  { nome: "Bruno", notas: [5,6,7,8,7] },
  { nome: "Carlos", notas: [9,9,8,10,9] }
];

const catalogo = document.getElementById("catalogo");

function render() {
  catalogo.innerHTML = "";
  const filtro = document.getElementById("busca").value.toLowerCase();

  alunos
    .filter(a => a.nome.toLowerCase().includes(filtro))
    .forEach(aluno => {

      const card = document.createElement("div");
      card.className = "card";
      card.innerText = aluno.nome;

      card.onclick = () => abrirModal(aluno);

      catalogo.appendChild(card);
    });
}

function abrirModal(aluno) {
  document.getElementById("nomeAluno").innerText = aluno.nome;
  const lista = document.getElementById("notas");
  lista.innerHTML = "";

  let soma = 0;

  aluno.notas.forEach((n,i) => {
    soma += n;
    const li = document.createElement("li");
    li.innerText = "Nota " + (i+1) + ": " + n;
    lista.appendChild(li);
  });

  document.getElementById("media").innerText =
    "Média: " + (soma / aluno.notas.length).toFixed(1);

  document.getElementById("modal").style.display = "block";
}

function adicionarAluno() {
  const nome = document.getElementById("novoNome").value;

  if(nome.trim() === "") return;

  alunos.push({
    nome: nome,
    notas: [0,0,0,0,0]
  });

  document.getElementById("novoNome").value = "";
  render();
}

document.getElementById("busca").oninput = render;
document.getElementById("fechar").onclick = () =>
  document.getElementById("modal").style.display = "none";

window.onclick = (e) => {
  if(e.target.id === "modal")
    document.getElementById("modal").style.display = "none";
};

render();
</script>

</body>
</html>
