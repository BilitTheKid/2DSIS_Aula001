<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Alunos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 20px;
      width: 150px;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
    }

    .modal-content {
      background: white;
      margin: 10% auto;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
    }

    #fechar {
      float: right;
      cursor: pointer;
      font-size: 20px;
    }
  </style>

</head>
<body>

  <h1>📚 Catálogo de Alunos</h1>

  <div class="container" id="catalogo"></div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="fechar">&times;</span>
      <h2 id="nomeAluno"></h2>
      <ul id="notas"></ul>
    </div>
  </div>

  <script>
    const alunos = [
      { nome: "Ana", notas: [8, 7, 9, 10, 6] },
      { nome: "Bruno", notas: [5, 6, 7, 8, 7] },
      { nome: "Carlos", notas: [9, 9, 8, 10, 9] }
    ];

    const catalogo = document.getElementById("catalogo");
    const modal = document.getElementById("modal");
    const nomeAluno = document.getElementById("nomeAluno");
    const notasLista = document.getElementById("notas");
    const fechar = document.getElementById("fechar");

    // Criar cards
    alunos.forEach(aluno => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerText = aluno.nome;

      card.onclick = () => {
        nomeAluno.innerText = aluno.nome;
        notasLista.innerHTML = "";

        aluno.notas.forEach((nota, i) => {
          const li = document.createElement("li");
          li.innerText = "Nota " + (i + 1) + ": " + nota;
          notasLista.appendChild(li);
        });

        modal.style.display = "block";
      };

      catalogo.appendChild(card);
    });

    // Fechar modal
    fechar.onclick = () => modal.style.display = "none";

    window.onclick = (e) => {
      if (e.target == modal) modal.style.display = "none";
    };
  </script>

</body>
</html>
