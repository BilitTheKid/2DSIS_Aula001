<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Catálogo de Alunos</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  margin: 0;
  color: #333;
}

/* Título */
h1 {
  text-align: center;
  color: white;
  margin-top: 20px;
}

/* Barra de busca */
.busca-box {
  display: flex;
  justify-content: center;
  margin: 20px;
}

#busca {
  width: 300px;
  padding: 12px 20px;
  border-radius: 30px;
  border: none;
  outline: none;
  font-size: 16px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Área de adicionar */
.add-box {
  text-align: center;
}

#novoNome {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 200px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #00c9a7;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #00a78b;
}

/* Cards */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.card {
  background: white;
  margin: 15px;
  padding: 20px;
  width: 180px;
  border-radius: 15px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
  text-align: center;
  font-weight: bold;
}

.card:hover {
  transform: translateY(-5px) scale(1.05);
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  top: 0;
  left: 0;
}

.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  width: 320px;
  border-radius: 12px;
  animation: aparecer 0.3s ease;
}

@keyframes aparecer {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

#fechar {
  float: right;
  cursor: pointer;
  font-size: 20px;
}

#media {
  margin-top: 10px;
  font-weight: bold;
  color: #444;
}

</style>
</head>

<body>

<h1>📚 Catálogo de Alunos</h1>

<div class="busca-box">
  <input type="text" id="busca" placeholder="🔍 Buscar aluno...">
</div>

<div class="add-box">
  <input type="text" id="novoNome" placeholder="Nome do aluno">
  <button onclick="adicionarAluno()">Adicionar</button>
</div>

<div class="container" id="catalogo"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span id="fechar">X</span>
    <h2 id="nomeAluno"></h2>
    <ul id="notas"></ul>
    <p id="media"></p>
  </div>
</div>

<script>
let alunos = [
  { nome: "Ana", notas: [8,7,9,10,6] },
  { nome: "Bruno", notas: [5,6,7,8,7] },
  { nome: "Carlos", notas: [9,9,8,10,9] }
];

const catalogo = document.getElementById("catalogo");

function normalizar(texto) {
  return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

function render() {
  catalogo.innerHTML = "";
  const filtro = normalizar(document.getElementById("busca").value);

  alunos
    .filter(a => normalizar(a.nome).includes(filtro))
    .forEach(aluno => {

      const card = document.createElement("div");
      card.className = "card";
      card.innerText = aluno.nome;

      card.onclick = () => abrirModal(aluno);

      catalogo.appendChild(card);
    });
}

function abrirModal(aluno) {
  document.getElementById("nomeAluno").innerText = aluno.nome;
  const lista = document.getElementById("notas");
  lista.innerHTML = "";

  let soma = 0;

  aluno.notas.forEach((n,i) => {
    soma += n;
    const li = document.createElement("li");
    li.innerText = "Nota " + (i+1) + ": " + n;
    lista.appendChild(li);
  });

  document.getElementById("media").innerText =
    "Média: " + (soma / aluno.notas.length).toFixed(1);

  document.getElementById("modal").style.display = "block";
}

function adicionarAluno() {
  const nome = document.getElementById("novoNome").value;

  if(nome.trim() === "") return;

  alunos.push({
    nome: nome,
    notas: [0,0,0,0,0]
  });

  document.getElementById("novoNome").value = "";
  render();
}

document.getElementById("busca").oninput = render;
document.getElementById("fechar").onclick = () =>
  document.getElementById("modal").style.display = "none";

window.onclick = (e) => {
  if(e.target.id === "modal")
    document.getElementById("modal").style.display = "none";
};

render();
</script>

</body>
</html>
